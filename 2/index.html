<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2: JS Assignments</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>JavaScript Demonstrations</h1>

    <div class="box">
        <h3>1. Variable Types & Input</h3>
        <input type="text" id="userInput" placeholder="Enter something">
        <button id="checkBtn">Check Value & Type</button>
        <p id="typeResult"></p>
    </div>

    <div class="box">
        <h3>2. Keyboard Event (Live Typing)</h3>
        <input type="text" id="keyInput" placeholder="Type here...">
        <p>You are typing: <span id="keyOutput"></span></p>
    </div>

    <div class="box">
        <h3>3. If-Else & Switch (Age Checker)</h3>
        <input type="number" id="ageInput" placeholder="Enter age">
        <button id="ageBtn">Process Age</button>
        <p id="ageResult"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
