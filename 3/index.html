<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3: To-Do List</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        #taskContainer { width: 300px; }
        .input-group { display: flex; margin-bottom: 20px; }
        #taskInput { flex-grow: 1; padding: 8px; }
        ul { list-style: none; padding: 0; width: 100%; }
        li { 
            background: #f9f9f9; 
            margin-bottom: 5px; 
            padding: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-radius: 4px;
            cursor: pointer;
        }
        li:hover { background: #eee; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <div id="taskContainer">
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button id="addBtn">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
