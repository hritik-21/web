<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 9 - Home</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }

        a { text-decoration: none; color: white; background: #007bff; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 10px; }

    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Static Page</h1>
